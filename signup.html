<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Career Guidance System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <h2>Career<span>Guide</span></h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="careers.html">Careers</a>
        <a href="login.html" class="btn">Login</a>
    </nav>
</header>

<!-- SIGNUP SECTION -->
<section class="hero">
    <div class="hero-text">
        <h1>Create an Account</h1>
        <p>Register to get personalized career guidance</p>

        <form onsubmit="signup(event)">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <button type="submit">Sign Up</button>
        </form>

        <p style="margin-top:15px;">
            Already have an account?
            <a href="login.html" style="color:#38bdf8;">Login here</a>
        </p>
    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2026 Career Guidance Final Year Project
</footer>

<script src="main.js"></script>
</body>
</html>
