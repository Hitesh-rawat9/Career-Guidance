<!DOCTYPE html>
<html>
<head>

<title>Login - Career Guidance</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* BIGGER NAVBAR STYLES */
.nav-link {
    position: relative;
    transition: all 0.3s ease;
    font-weight: 600;
    font-size: 1.125rem;
    padding: 0.5rem 1rem;
}

.nav-link::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 3px;
    background: #0ea5e9;
    transition: width 0.3s ease;
    border-radius: 2px;
}

.nav-link:hover::after {
    width: 100%;
}

.nav-link:hover {
    color: #0ea5e9;
    text-shadow: 0 0 10px rgba(14, 165, 233, 0.3);
    transform: scale(1.05);
}

.nav-link.active {
    color: #0ea5e9;
    font-weight: 700;
}

.nav-link.active::after {
    width: 100%;
    background: linear-gradient(90deg, #0ea5e9, #38bdf8);
    box-shadow: 0 0 10px rgba(14, 165, 233, 0.5);
}

.nav-link-bg {
    transition: all 0.3s ease;
}

.nav-link-bg:hover {
    background: rgba(14, 165, 233, 0.1);
    border-radius: 0.5rem;
}

.btn-hover {
    transition: all 0.3s ease;
}

.btn-hover:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 30px rgba(14, 165, 233, 0.3);
}

.btn-hover:active {
    transform: scale(0.98);
}

.input-focus {
    transition: all 0.3s ease;
}

.input-focus:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    outline: none;
}

.form-card {
    transition: all 0.3s ease;
}

.form-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
}
</style>

</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex flex-col">

<!-- BIGGER NAVBAR -->
<nav class="flex justify-between items-center py-6 px-10 bg-white/95 backdrop-blur-md w-full z-50 border-b-2 border-sky-100 shadow-lg">

<!-- Logo - BIGGER -->
<h1 class="text-3xl font-bold text-sky-600 tracking-wide">
    <a href="index.html" class="hover:text-sky-500 transition-colors cursor-pointer">CareerGuide</a>
</h1>

<!-- Navigation Links - BIGGER -->
<div class="flex items-center space-x-4">

<a href="index.html" class="nav-link nav-link-bg text-slate-700 hover:text-sky-600 px-4 py-2">
    <span class="relative z-10">Home</span>
</a>
<a href="career.html" class="nav-link nav-link-bg text-slate-700 hover:text-sky-600 px-4 py-2">
    <span class="relative z-10">Career Path</span>
</a>
<a href="about.html" class="nav-link nav-link-bg text-slate-700 hover:text-sky-600 px-4 py-2">
    <span class="relative z-10">About</span>
</a>
<a href="contact.html" class="nav-link nav-link-bg text-slate-700 hover:text-sky-600 px-4 py-2">
    <span class="relative z-10">Contact</span>
</a>

<!-- Auth Buttons - BIGGER -->
<div id="auth-buttons" class="flex items-center space-x-4">
    <a href="login.html" class="nav-btn bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-xl font-semibold transition-all duration-300 btn-hover text-base shadow-lg shadow-blue-500/30">
        Login
    </a>
    <a href="signup.html" class="nav-btn border-2 border-sky-500 text-sky-600 hover:bg-sky-500 hover:text-white px-6 py-3 rounded-xl font-semibold transition-all duration-300 btn-hover text-base">
        Sign Up
    </a>
</div>

<!-- User Profile (shown when logged in) -->
<div id="user-profile" class="hidden items-center space-x-4">
    <div class="flex items-center space-x-3 bg-sky-50 px-4 py-2 rounded-xl border border-sky-100">
        <div class="w-10 h-10 bg-sky-500 rounded-full flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
        </div>
        <span id="user-name" class="font-semibold text-slate-700">User</span>
    </div>
    <button id="logout-btn" class="nav-btn border-2 border-red-500 text-red-500 hover:bg-red-500 hover:text-white px-6 py-3 rounded-xl font-semibold transition-all duration-300 btn-hover text-base">
        Logout
    </button>
</div>

</div>

</nav>

<!-- Main Content -->
<main class="flex-grow flex items-center justify-center py-12 px-6">

<div class="w-full max-w-md">

    <!-- Login Form Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8 form-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Welcome Back</h1>
            <p class="text-slate-600">Sign in to continue your journey</p>
        </div>
        
        <form action="/api/login" method="POST">
            <div class="mb-6">
                <label class="block text-slate-700 font-semibold mb-2">Email</label>
                <input name="email" type="email" placeholder="your.email@example.com" class="w-full border border-slate-300 p-4 rounded-xl input-focus text-slate-700">
            </div>
            
            <div class="mb-6">
                <label class="block text-slate-700 font-semibold mb-2">Password</label>
                <input type="password" name="password" placeholder="Enter your password" class="w-full border border-slate-300 p-4 rounded-xl input-focus text-slate-700">
            </div>
            
            <div class="flex items-center justify-between mb-6">
                <label class="flex items-center">
                    <input type="checkbox" class="w-4 h-4 text-blue-500 rounded border-slate-300 focus:ring-blue-500">
                    <span class="ml-2 text-slate-600 text-sm">Remember me</span>
                </label>
                <a href="#" class="text-blue-500 hover:text-blue-600 text-sm font-semibold">Forgot password?</a>
            </div>
            
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-4 rounded-xl font-semibold transition-all duration-300 btn-hover w-full text-lg shadow-lg shadow-blue-500/30">
                Sign In
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-slate-600">
                Don't have an account? 
                <a href="signup.html" class="text-blue-500 hover:text-blue-600 font-semibold">Sign up</a>
            </p>
        </div>
    </div>

</div>

</main>

<!-- Footer -->
<footer class="bg-white py-6 border-t border-slate-200">
<div class="container mx-auto px-6 text-center">
    <p class="text-slate-400 text-sm">© 2026 CareerGuide. All rights reserved.</p>
</div>
</footer>

<script src="main.js"></script>

</body>
</html>
